name: Pytest

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mlmm with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" || pip install -e .
          pip install pytest pytest-cov pytest-timeout
        timeout-minutes: 15

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short -x --timeout=120 --cov=mlmm_toolkit --cov-report=term-missing --cov-fail-under=50
        timeout-minutes: 10

      - name: Run hessian_ff tests
        run: |
          pytest hessian_ff/tests/ -v --tb=short -x --timeout=120 --cov=hessian_ff --cov-report=term-missing --cov-fail-under=50
        timeout-minutes: 10

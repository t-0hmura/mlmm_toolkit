name: Docs Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  reference-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e . --no-deps
          pip install click pyyaml numpy biopython scipy ase \
            autograd dask distributed h5py fabric jinja2 joblib \
            matplotlib natsort psutil rmsd sympy scikit-learn \
            pandas tabulate plotly kaleido ParmEd

      - name: Run docs quality suite
        timeout-minutes: 20
        env:
          DOCS_DUMP_CASE_TIMEOUT_SEC: "180"
        run: |
          set -o pipefail
          python scripts/run_docs_quality.py | tee docs_quality_timing.log

      - name: Upload docs quality timing log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs_quality_timing_log
          path: docs_quality_timing.log

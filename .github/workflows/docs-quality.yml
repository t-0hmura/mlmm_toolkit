name: Docs Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  reference-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install click pyyaml

      - name: Check generated references
        run: |
          python scripts/generate_reference.py --check

      - name: Check intro template headings
        run: |
          python scripts/check_intro_template.py

      - name: Check markdown local links
        run: |
          python scripts/check_markdown_links.py

      - name: Smoke docs commands
        run: |
          python scripts/smoke_docs_commands.py

      - name: Check all->scan option contract
        run: |
          python scripts/check_all_scan_contract.py

      - name: Smoke dump trajectories
        timeout-minutes: 30
        env:
          MLMM_DUMP_CASE_TIMEOUT_SEC: "300"
        run: |
          python scripts/smoke_dump_trajectories.py
